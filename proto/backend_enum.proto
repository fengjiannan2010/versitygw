  EVENT_S3_REPLICATION_OPERATION_MISSED_THRESHOLD = 16;

  // S3 复制操作在阈值后复制 ("s3:Replication:OperationReplicatedAfterThreshold")
  EVENT_S3_REPLICATION_OPERATION_REPLICATED_AFTER_THRESHOLD = 17;

  // S3 对象恢复 - 删除 ("s3:ObjectRestore:Delete")
  EVENT_S3_OBJECT_RESTORE_DELETE = 18;

  // S3 生命周期转换 ("s3:LifecycleTransition")
  EVENT_S3_LIFECYCLE_TRANSITION = 19;

  // S3 智能分层 ("s3:IntelligentTiering")
  EVENT_S3_INTELLIGENT_TIERING = 20;

  // S3 对象 ACL 设置 ("s3:ObjectAcl:Put")
  EVENT_S3_OBJECT_ACL_PUT = 21;

  // S3 生命周期到期 ("s3:LifecycleExpiration:*")
  EVENT_S3_LIFECYCLE_EXPIRATION = 22;

  // S3 生命周期到期 - 删除 ("s3:LifecycleExpiration:Delete")
  EVENT_S3_LIFECYCLE_EXPIRATION_DELETE = 23;

