  // S3 对象标签 - Put ("s3:ObjectTagging:Put")
  EVENT_S3_OBJECT_TAGGING_PUT = 26;

  // S3 对象标签 - 删除 ("s3:ObjectTagging:Delete")
  EVENT_S3_OBJECT_TAGGING_DELETE = 27;
}




