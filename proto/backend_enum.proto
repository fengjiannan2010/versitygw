syntax = "proto3";

package backend;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";


message ShutdownInput{
  Metadata resultMetadata = 1;
}

message ShutdownOutput{
  Metadata resultMetadata = 1;
}

message GetGateWayTypeOutput{
  string gatewayType = 1;
}


// Bucket相关消息
message ListBucketsInput {
  string owner = 1;
  bool isAdmin = 2;
}

message ListBucketsOutput {
  repeated Bucket buckets = 1;
  Owner owner = 2;
  Metadata resultMetadata = 3;
}

// 相关的消息定义
message Bucket {
  string name = 1;
  google.protobuf.Timestamp creationDate = 2;
}

// 头部桶的输入
message HeadBucketInput {

  // The bucket name.
  // This member is required.
  string bucket = 1;

  // The account ID of the expected bucket owner.
  // If the account ID that you provide does not match the actual owner of the bucket,
  // the request fails with the HTTP status code 403 Forbidden (access denied).
  string expectedBucketOwner = 2;
}

// 头部桶的输出
message HeadBucketOutput {

  // Indicates whether the bucket name used in the request is an access point alias.
  // This functionality is not supported for directory buckets.
  bool accessPointAlias = 1;

  // The name of the location where the bucket will be created.
  // For directory buckets, the AZ ID of the Availability Zone where the bucket is
  // created. An example AZ ID value is usw2-az1.
  // This functionality is only supported by directory buckets.
  string bucketLocationName = 2;

  // The type of location where the bucket is created.
  // This functionality is only supported by directory buckets.
  LocationType bucketLocationType = 3;

  // The Region that the bucket is located.
  // This functionality is not supported for directory buckets.
  string bucketRegion = 4;

  // Metadata pertaining to the operation's result.
  // Metadata can include key-value pairs and other information about the operation.
  Metadata resultMetadata = 5;
}

// Metadata 表示操作结果的元数据
message Metadata {
  repeated MetadataEntry entries = 1;
}

// MetadataEntry 表示元数据中的一个键值对
message MetadataEntry {
  string key = 1;
  string value = 2;
}

// 获取桶的ACL输入
message GetBucketAclInput {
  // The bucket name.
  // This member is required.
  string bucket = 1;

  // The account ID of the expected bucket owner.
  // If the account ID that you provide does not match the actual owner of the bucket,
  // the request fails with the HTTP status code 403 Forbidden (access denied).
  string expectedBucketOwner = 2;
}

// 获取桶的ACL输出
message GetBucketAclOutput {

  // A list of grants.
  repeated Grant grants = 1;

  // Container for the bucket owner's display name and ID.
  Owner owner = 2;

  // Metadata pertaining to the operation's result.
  Metadata resultMetadata = 3;
}

message Grant {
  Grantee grantee = 1;
  Permission permission = 2;
}

message Grantee {
  Type type = 1;
  string id = 2;
  string uri = 3;
  string displayName = 4;
  string emailAddress = 5;
}

message Owner {
  string id = 1;
  string displayName = 2;
}

// 创建桶的请求
message CreateBucketInput {

  // The name of the bucket to create.
  // This member is required.
  string bucket = 1;

  // The canned ACL to apply to the bucket.
  BucketCannedACL acl = 2;

  // The configuration information for the bucket.
  CreateBucketConfiguration createBucketConfiguration = 3;

  // Allows grantee the read, write, read ACP, and write ACP permissions on the bucket.
  string grantFullControl = 4;

  // Allows grantee to list the objects in the bucket.
  string grantRead = 5;

  // Allows grantee to read the bucket ACL.
  string grantReadACP = 6;

  // Allows grantee to create new objects in the bucket.
  string grantWrite = 7;

  // Allows grantee to write the ACL for the applicable bucket.
  string grantWriteACP = 8;

  // Specifies whether you want S3 Object Lock to be enabled for the new bucket.
  bool objectLockEnabledForBucket = 9;

  // The container element for object ownership for a bucket's ownership controls.
  ObjectOwnership objectOwnership = 10;

  bytes defaultACL = 30;
}

message CreateBucketOutput{
  string location = 1;
  Metadata resultMetadata = 2;
}

message CreateBucketConfiguration{
  BucketInfo bucket = 1;
  LocationInfo location = 2;
  BucketLocationConstraint locationConstraint = 3;
}

message BucketInfo{
  DataRedundancy dataRedundancy = 1;
  BucketType type = 2;
}

message LocationInfo{
  string name = 1;
  LocationType type = 2;
}

